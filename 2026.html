let currentMonth = "june";
let currentGame = 0;

function displayGame() {
    const game = games[currentMonth][currentGame];

    let html = "";

    html += `<h2>${game.title}</h2>`;

    if (game.coverImage) {
        html += `
            <img src="${game.coverImage}" alt="${game.title}" width="100%">
        `;
    }

    if (game.genres) {
        html += `<p><strong>Genres:</strong> ${game.genres}</p>`;
    }

    if (game.releaseDate) {
        html += `<p><strong>Release Date:</strong> ${game.releaseDate}</p>`;
    }

    if (game.platform) {
        html += `<p><strong>Platform:</strong> ${game.platform}</p>`;
    }

    if (game.developer) {
        html += `<p><strong>Developer:</strong> ${game.developer}</p>`;
    }

    if (game.publisher) {
        html += `<p><strong>Publisher:</strong> ${game.publisher}</p>`;
    }

    if (game.finished) {
        html += `<p><strong><br>Finished:</strong> ${game.finished}</p>`;
    }

    if (game.playtime) {
        html += `<p><strong>Playtime:</strong> ${game.playtime}</p>`;
    }

    if (game.rating) {
        html += `<p><strong>Rating:</strong> ${game.rating}</p>`;
    }

    if (game.titleImage) {
        html += `
            <img src="${game.titleImage}" alt="Title Screen" width="100%">
        `;
    }

    if (game.body) {
        game.body.forEach(paragraph => {
            html += `<p>${paragraph}</p>`;
        });
    }

    if (game.bonusImage1) {
        html += `
            <img src="${game.bonusImage1}" alt="Bonus Image" width="100%">
        `;
    }

    if (game.body2) {
        game.body2.forEach(paragraph => {
            html += `<p>${paragraph}</p>`;
        });
    }

    document.getElementById("journalContent").innerHTML = html;

    document.getElementById("gameCounter").textContent =
        `Game ${currentGame + 1} / ${games[currentMonth].length}`;
}

document.getElementById("monthSelect").addEventListener("change", (event) => {
    currentMonth = event.target.value;
    currentGame = 0;
    displayGame();
});

document.getElementById("nextGame").addEventListener("click", () => {
    currentGame++;

    if (currentGame >= games[currentMonth].length) {
        currentGame = 0;
    }

    displayGame();
});

document.getElementById("prevGame").addEventListener("click", () => {
    currentGame--;

    if (currentGame < 0) {
        currentGame = games[currentMonth].length - 1;
    }

    displayGame();
});

displayGame();
